---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install common packages
  apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - zip
      - tmux
      - vim
      - htop
      - net-tools
      - apt-transport-https
      - ca-certificates
      - gnupg2
      - lsb-release
      - acl
    state: present
